<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <title>Calculadora de Pagos</title>
  </head>
  <body class="total">
    <h1 class="text-center">Calculadora de Pagos en Cuotas</h1>
    <div class="text-center">
      <form class="container" id="paymentForm">
        <input type="number" id="amount" placeholder="Monto" />
        <select id="interest">
          <option value="24">24%</option>
          <option value="36">36%</option>
          <option value="60">60%</option>
          <option value="80">80%</option>
        </select>
        <input type="number" id="months" placeholder="Meses" />
        <button type="submit" id="calcularPagoBtn">Calcular Pago</button>
        <button type="button" id="guardarPrestamoBtn">Guardar Préstamo</button>
      </form>
    </div>
    <table class="container m-3" id="paymentTable">
      <thead>
        <tr class="m-5">
          <th>Mes</th>
          <th>Capital al Inicio</th>
          <th>Pago de Principal</th>
          <th>Pago de Interés</th>
          <th>Pago Total</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div id="loadingSpinner">
      <strong role="status">Guardando...</strong>
      <div class="spinner-border ms-auto" aria-hidden="true"></div>
    </div>
    <button class="d-grid gap-2 col-6 mx-auto p-3 m-3">
      <a class="text-decoration-none link" href="./promos.html"
        >OBSERVA SUGERENCIAS</a
      >
    </button>
    <button class="d-grid gap-2 col-6 mx-auto p-3 m-3">
      <a class="text-decoration-none link" href="./prestamoscreados.html"
        >PRESTAMOS YA SOLICITADOS</a
      >
    </button>
    <button class="d-grid gap-2 col-6 mx-auto p-3 m-3">
      <a class="text-decoration-none link" href="../index.html">INICIO</a>
    </button>
    <footer class="footer">
      <div class="footer-content">
        <div class="footer-left">
          <p>E-MAIL nicolaslingurini@gmail.com</p>
          <p>Celular 223-5135367</p>
        </div>
        <div class="footer-center">
          <a href="https://www.facebook.com/" class="social-icon"
            ><img
              class="imglogo"
              src="../img/facebook-logo_49354.png"
              alt="logo facebook"
          /></a>
          <a href="https://www.instagram.com/" class="social-icon"
            ><img
              class="imglogo"
              src="../img/instagram_1384015.png"
              alt="logo instagram"
          /></a>
          <a href=" https://wa.me/2235421117" class="social-icon"
            ><img class="imglogo" src="../img/whatsapp.png" alt="logo whasapp"
          /></a>
          <a href="https://www.youtube.com/" class="social-icon"
            ><img class="imglogo" src="../img/youtube.png" alt="logo youtube"
          /></a>
        </div>
        <div class="footer-right">
          <img
            class="imglogowp"
            src="../img/wpmio.jpg"
            alt="Imagen de Footer"
          />
        </div>
      </div>
    </footer>

    <script src="../js/main.js"></script>
  </body>
</html>
